name: Audi Bazos Monitor


on:

  schedule:

    - cron: "*/10 * * * *"

  workflow_dispatch:



jobs:

  monitor:

    runs-on: ubuntu-latest


    steps:

    - name: Stiahni kód

      uses: actions/checkout@v4



    - name: Python

      uses: actions/setup-python@v5

      with:

        python-version: "3.12"



    - name: Inštalácia

      run:

        pip install -r requirements.txt



    - name: Spusti monitor

      run:

        python main.py
