name: Audi Bazos Monitor

on:
  schedule:
    - cron: "*/10 * * * *"

  workflow_dispatch:


jobs:

  monitor:

    runs-on: ubuntu-latest


    permissions:
      contents: write


    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5

        with:
          python-version: "3.12"


      - name: Install packages
        run: pip install -r requirements.txt


      - name: Run monitor
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

        run: python main.py


      - name: Save seen ads

        run: |
          git config --global user.name "Audi Bot"
          git config --global user.email "bot@github.com"

          git add seen.json

          git commit -m "Update seen ads" || exit 0

          git push
